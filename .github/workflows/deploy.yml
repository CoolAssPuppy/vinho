name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
  workflow_dispatch:
    inputs:
      deploy_all_functions:
        description: 'Deploy all edge functions'
        required: false
        default: true
        type: boolean

concurrency:
  group: vinho-deploy
  cancel-in-progress: false

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

jobs:
  deploy-database:
    name: Deploy database migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
      - name: Push database migrations
        run: supabase db push

  detect-changes:
    name: Detect function changes
    runs-on: ubuntu-latest
    outputs:
      shared_changed: ${{ steps.functions-check.outputs.shared_changed }}
      changed_functions: ${{ steps.functions-check.outputs.changed_functions }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed functions
        id: functions-check
        run: |
          CHANGED_FUNCTIONS=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/' | \
            grep -oE 'supabase/functions/[^/]+' | \
            sed 's|supabase/functions/||' | \
            grep -v '^_shared$' | \
            sort -u | \
            while read -r name; do [ -d "supabase/functions/$name" ] && echo "$name"; done | \
            tr '\n' ' ' || echo "")
          echo "changed_functions=$CHANGED_FUNCTIONS" >> $GITHUB_OUTPUT

          if git diff --name-only HEAD~1 HEAD -- 'supabase/functions/_shared/' | grep -q .; then
            echo "shared_changed=true" >> $GITHUB_OUTPUT
          else
            echo "shared_changed=false" >> $GITHUB_OUTPUT
          fi

  deploy-functions:
    name: Deploy edge functions
    runs-on: ubuntu-latest
    needs: [deploy-database, detect-changes]
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy changed functions only
        if: |
          needs.detect-changes.outputs.shared_changed != 'true' &&
          github.event.inputs.deploy_all_functions != 'true' &&
          needs.detect-changes.outputs.changed_functions != ''
        run: |
          for func in ${{ needs.detect-changes.outputs.changed_functions }}; do
            echo "Deploying function: $func"
            supabase functions deploy "$func"
          done

      - name: Deploy all functions
        if: |
          needs.detect-changes.outputs.shared_changed == 'true' || github.event.inputs.deploy_all_functions == 'true'
        run: |
          ALL_FUNCTIONS=$(ls -d supabase/functions/*/ 2>/dev/null | \
            xargs -I {} basename {} | \
            grep -v '^_shared$' | \
            tr '\n' ' ')
          echo "Deploying all functions: $ALL_FUNCTIONS"
          for func in $ALL_FUNCTIONS; do
            echo "Deploying function: $func"
            supabase functions deploy "$func"
          done

  notify-completion:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [deploy-database, deploy-functions]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Database | ${{ needs.deploy-database.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Edge functions | ${{ needs.deploy-functions.result }} |" >> $GITHUB_STEP_SUMMARY
